name: Build and Deploy
on:
  push:
    tags: ["v*"]

jobs:
  build-and-deploy:
    runs-on: [self-hosted, prod]
    environment:
      name: production
      url: http://8.136.217.93:8081
    steps:
      - uses: actions/checkout@v4

      - name: Build server (green)
        run: docker build -t cicd-server:green -f server/Dockerfile .

      - name: Build web (green)
        run: docker build -t cicd-web:green -f web/Dockerfile .

      - name: Deploy green
        run: /opt/projects/cicd-/deploy.sh green

      - name: Health check green
        run: |
          for i in 1 2 3 4 5; do
            sleep 3
            curl -sf http://localhost:8004/ && echo "Green OK" && exit 0
          done
          echo "Green failed - rolling back"
          docker compose -f /opt/projects/cicd-/docker-compose.yml stop server-green web-green
          exit 1

      - name: Promote green to blue
        run: |
          cd /opt/projects/cicd-
          docker tag cicd-server:green cicd-server:blue
          docker tag cicd-web:green cicd-web:blue
          docker compose stop server-blue web-blue 2>/dev/null || true
          docker compose rm -f server-blue web-blue 2>/dev/null || true
          docker compose up -d server-blue web-blue
          docker compose stop server-green web-green
          docker compose ps
