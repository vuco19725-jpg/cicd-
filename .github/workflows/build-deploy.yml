name: Build and Deploy
on:
  push:
    tags:
      - "v*"

jobs:
  build-and-deploy:
    runs-on: [self-hosted, prod]
    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -t cicd-server -f server/Dockerfile .

      - name: Build web image
        run: docker build -t cicd-web -f web/Dockerfile .

      - name: Deploy
        run: |
          cd /opt/projects/cicd-
          docker compose down 2>/dev/null || true
          docker tag cicd-server ghcr.io/vuco19725-jpg/cicd--server:latest
          docker tag cicd-web ghcr.io/vuco19725-jpg/cicd--web:latest
          docker compose up -d --wait
          docker compose ps
