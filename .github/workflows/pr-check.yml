name: PR Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: web
      - run: npm run lint
        working-directory: web

  build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: web
      - run: npm run build
        working-directory: web

  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: web
      - run: npm test
        working-directory: web

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

  ai-review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request && github.actor != 'dependabot[bot]'
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff
        run: |
          git diff origin/main...HEAD > /tmp/pr.diff
          DIFF_SIZE=$(wc -c < /tmp/pr.diff)
          echo "Diff size: $DIFF_SIZE bytes ($(wc -l < /tmp/pr.diff) lines)"

          # Truncate if diff exceeds ~80KB to stay within context limits
          if [ "$DIFF_SIZE" -gt 80000 ]; then
            head -c 80000 /tmp/pr.diff > /tmp/pr-truncated.diff
            echo "" >> /tmp/pr-truncated.diff
            echo "[WARNING] Diff was truncated from $DIFF_SIZE to 80000 bytes. Some files may not be reviewed." >> /tmp/pr-truncated.diff
            mv /tmp/pr-truncated.diff /tmp/pr.diff
          fi

      - name: AI Code Review
        if: env.DEEPSEEK_API_KEY != ''
        run: bash scripts/ai-review.sh "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip AI review
        if: env.DEEPSEEK_API_KEY == ''
        run: echo "AI review skipped - DEEPSEEK_API_KEY secret not configured"
