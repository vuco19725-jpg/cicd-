name: Auto Create PR
on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Pull Request
        uses: repo-sync/pull-request@v2
        with:
          destination_branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_title: "${{ github.event.head_commit.message }}"
          pr_body: |
            自动创建的 PR
            分支: ${{ github.ref_name }}
            等待 CI 和 AI 审查完成。
          pr_draft: false
